.dbtn.sel .dlab{color:var(--primary)}

.dhoy{font-size:7px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);min-height:8px}

// ── STATE ─────────────────────────────────────────────────────
let day=0,tab='comidas',snack=false;
const now=new Date();
const todayIdx=[6,0,1,2,3,4,5][now.getDay()];

// ── TYPE CONFIG ───────────────────────────────────────────────
function tc(t){
  if(t==='gym') return {dot:'#1e6b3e',badge:'#1e6b3e',btxt:'#fff'};
  return           {dot:'#7fa891',badge:'#4a6858',btxt:'#fff'};
}

// ── RENDER BAR ────────────────────────────────────────────────
function renderBar(){
  document.getElementById('dbar').innerHTML=D.map((d,i)=>{
    const c=tc(d.type),sel=i===day,isTd=i===todayIdx;
    return `<button class="dbtn${sel?' sel':''}" onclick="setDay(${i})">
      <div class="dlab">${d.s}</div>
      <div class="ddot" style="background:${c.dot};${sel?`box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px ${c.dot}`:''}"></div>
      <div class="dtype">${d.sub}</div>
      <div class="dhoy">${isTd?'HOY':''}</div>
    </button>`;
  }).join('');
}

          <div class="bact">${p.act}</div>
        </div>
        <span class="btype" style="background:${c.badge};color:${c.btxt};">${p.sub}</span>
      </div>
      <div class="mchips">
        <span class="chip accent">${p.kcal} kcal</span>
        <span class="chip">P ${p.mac.p} g</span>
        <span class="chip">C ${p.mac.c} g</span>
        <span class="chip">G ${p.mac.g} g</span>
      </div>
    </div>
    <div class="tbar">
      <button class="tbtn${tab==='c'?' sel':''}" onclick="setTab('c')">Comidas</button>
      <button class="tbtn${tab==='t'?' sel':''}" onclick="setTab('t')">Entrenamiento</button>
      <button class="tbtn${tab==='r'?' sel':''}" onclick="setTab('r')">Rutina</button>
    </div>
    <div id="content" class="fade-in"></div>`;
  renderContent();
}

// ── MEAL CARD ─────────────────────────────────────────────────
function mealCard(n,m,badge,btxt,note=''){
  const repId='rep_'+n+'_'+day;
  const itemsH=m.items.map(([lbl,g])=>
    `<div class="mitem"><div class="idot"></div><span>${lbl}</span>${g?`<span class="igram">${g}</span>`:''}</div>`
  ).join('');
  let repH='';
  if(m.rep&&m.rep.length){
    const cats=m.rep.map(k=>{
      const rows=REP[k].map(r=>`<div class="rep-item"><span>${r.n}</span><span class="rep-g">${r.g}</span></div>`).join('');
      return `<div class="rep-cat"><span class="rep-cat-lbl">${RCAT[k]}</span>${rows}</div>`;
    }).join('');
    repH=`<button class="rep-btn" id="btn_${repId}" onclick="toggleRep('${repId}')">
      <span>Reemplazos</span><span class="arr">▾</span>
    </button>
    <div class="rep-panel" id="${repId}">${cats}</div>`;
  }
  return `<div class="mrow">
    <div class="mnum" style="background:${badge};color:${btxt};">${n}</div>
    <div class="mcard">
      <div class="mhd"><div><div class="mn">${m.lbl}</div><div class="mt">${m.t}</div></div></div>
      ${note?`<div class="lightnote">${note}</div>`:''}
      <div class="mitems">${itemsH}</div>
      ${repH}
    </div>
  </div>`;
}

// ── RENDER MEALS ──────────────────────────────────────────────
function renderMeals(){
  const p=D[day],c=tc(p.type),m=p.meals;
  const cenaData=snack?m.cenL:m.cen;
  document.getElementById('content').innerHTML=`
    <div class="stog-wrap">
      <button class="stog${snack?' on':''}" onclick="toggleSnack()">
        <span style="font-size:13px;">${snack?'−':'+'}</span> ${snack?'Quitar snack':'Agregar snack'}
      </button>
    </div>
    <div class="tl">
      ${mealCard(1,m.des,c.badge,c.btxt)}
      ${mealCard(2,m.alm,c.badge,c.btxt)}
      ${snack?mealCard('S',m.snk,'#7fa891','#fff'):''}
      ${mealCard(snack?4:3,cenaData,c.badge,c.btxt,snack?cenaData.note:'')}
    </div>
    <div class="note">Registra todo en Bevel — foto + descripción</div>
    <div style="height:18px;"></div>`;
}

// ── RENDER TRAINING ───────────────────────────────────────────
function renderTrain(){
  const p=D[day],c=tc(p.type),t=p.train;
  let h=`<div class="trwrap">`;
  if(t.type==='gym'){
    h+=`<div class="trlbl">${t.lbl}</div>
    <div class="trfoc">${t.foc}</div>
    <div class="extbl">
      <div class="exrow ehdr"><span>Ejercicio</span><span>Series</span><span>Reps</span><span>Descanso</span><span>RIR</span></div>
      ${t.ex.map(r=>`<div class="exrow"><span class="exn">${r[0]}</span><span class="exv">${r[1]}</span><span class="exv">${r[2]}</span><span class="exd">${r[3]}</span><span class="exd">${r[4]}</span></div>`).join('')}
    </div>
    <div class="note" style="margin-bottom:10px;">Registra peso y reps — supera la sesión anterior</div>`;
  } else {
    h+=`<div class="restcard">
      <div class="resttl">Descanso</div>
      <div class="restds">${t.desc}</div>
      ${t.items.map(i=>`<div class="sessitem"><div class="idot" style="flex-shrink:0;margin-top:0;background:#7fa891;"></div><span style="color:var(--muted);">${i}</span></div>`).join('')}
    </div>
    <div style="margin-top:10px;" class="note">El descanso también es entrenamiento</div>`;
  }
  h+=`<div style="height:18px;"></div></div>`;
  document.getElementById('content').innerHTML=h;
}

function renderContent(){
  if(tab==='c') renderMeals();
  else if(tab==='t') renderTrain();
  else renderSchedule();
}
